name: Deploy

on:
  push:
    tags: ["v*.*.*"]
  workflow_dispatch:

jobs:
  images:
    name: Build & push images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        service: [api, worker, web]
    steps:
      - uses: actions/checkout@v4
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build & push
        uses: docker/build-push-action@v5
        with:
          context: ./${{ matrix.service }}
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/flowforge-${{ matrix.service }}:${{ github.ref_name }}
            ghcr.io/${{ github.repository_owner }}/flowforge-${{ matrix.service }}:latest
