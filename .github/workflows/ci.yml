name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  api:
    name: API (lint + tests)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install
        run: |
          pip install -e ".[dev]"
      - name: Lint
        run: ruff check app tests
      - name: Tests
        env:
          FIXTURE_MODE: "true"
          DATABASE_URL: sqlite:///:memory:
        run: pytest -q

  web:
    name: Web (lint + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package.json
      - name: Install
        run: npm install
      - name: Type-check + build
        run: npm run build
